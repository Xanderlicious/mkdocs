  - Archive:
    - USG: USG.md
    - Duplicati: duplicati.md
    - Glances: glances.md
    - Vaultwarden: vaultwarden.md
    - Cuthbert: cuthbert.md

theme:
  logo: images/server-solid.svg
  name: 'material'
  palette:
    scheme: slate
    primary: purple
    accent: green
  font:
    text: Roboto
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    #- navigation.expand
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotation
    - content.code.select
    - content.tabs.link
  language: en

  icon:
    repo: fontawesome/brands/github

extra:
  analytics:
    provider: google
    property: G-3XSJT56P7R
  consent:
    title: Cookie consent
    description: >- 
      xander's lab uses cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of the documentation and whether users
      find what they're searching for. With your consent, you're helping me
      make the documentation better.

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:

repo_url: https://github.com/xanderlicious/mkdocs
repo_name: xanderlicious/mkdocs
